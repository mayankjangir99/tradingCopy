<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#57b6ff">
  <meta name="tradepro-api-base" content="https://tradingcopy-0p0k.onrender.com">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="alternate icon" type="image/x-icon" href="favicon.ico">
  <title>TradePro AI Control Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-dashboard">
  <section class="panel app-shell app-shell-dashboard">
    <header class="page-head">
      <div>
        <span class="page-flag">Preferences and audit</span>
        <h2 class="brand-title dashboard-title">Control Center</h2>
        <p class="brand-sub">Theme, workspaces, and audit activity timeline</p>
      </div>
      <div class="page-actions">
        <button class="btn ghost btn-auto" type="button" onclick="window.location='dashboard.html'">Back</button>
      </div>
    </header>

    <main class="page-main stack control-center-main">
      <section class="card control-section">
        <div class="row space section-head">
          <h3 class="section-title">Theme</h3>
          <div class="row">
            <button class="btn ghost btn-auto" type="button" id="themeLoadBtn">Load Theme</button>
            <button class="btn ghost btn-auto" type="button" id="themeSaveBtn">Save Theme</button>
          </div>
        </div>
        <div class="planner-fields control-primary-grid">
          <select id="themePick">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="neon">Neon</option>
          </select>
        </div>
        <div class="row space section-head" style="margin-top:18px;">
          <div>
            <h3 class="section-title">Custom Colors</h3>
            <p class="brand-sub">Override the site palette with your own colors.</p>
          </div>
          <div class="row">
            <button class="btn ghost btn-auto" type="button" id="colorsLoadBtn">Load Colors</button>
            <button class="btn ghost btn-auto" type="button" id="colorsResetBtn">Reset Colors</button>
            <button class="btn ghost btn-auto" type="button" id="colorsSaveBtn">Save Colors</button>
          </div>
        </div>
        <div class="color-grid" id="customColorGrid">
          <label class="color-field">
            <span class="color-label">Background 1</span>
            <input class="color-swatch-input" id="colorBg0" type="color" value="#07111f">
          </label>
          <label class="color-field">
            <span class="color-label">Background 2</span>
            <input class="color-swatch-input" id="colorBg1" type="color" value="#0f1c30">
          </label>
          <label class="color-field">
            <span class="color-label">Background 3</span>
            <input class="color-swatch-input" id="colorBg2" type="color" value="#17263f">
          </label>
          <label class="color-field">
            <span class="color-label">Card</span>
            <input class="color-swatch-input" id="colorCard" type="color" value="#091222">
          </label>
          <label class="color-field">
            <span class="color-label">Card Strong</span>
            <input class="color-swatch-input" id="colorCardStrong" type="color" value="#0d182c">
          </label>
          <label class="color-field">
            <span class="color-label">Text</span>
            <input class="color-swatch-input" id="colorText" type="color" value="#edf3ff">
          </label>
          <label class="color-field">
            <span class="color-label">Muted Text</span>
            <input class="color-swatch-input" id="colorMuted" type="color" value="#92a8c8">
          </label>
          <label class="color-field">
            <span class="color-label">Border</span>
            <input class="color-swatch-input" id="colorLine" type="color" value="#8aacd6">
          </label>
          <label class="color-field">
            <span class="color-label">Border Strong</span>
            <input class="color-swatch-input" id="colorLineStrong" type="color" value="#85c0ff">
          </label>
          <label class="color-field">
            <span class="color-label">Accent 1</span>
            <input class="color-swatch-input" id="colorAccent" type="color" value="#65c3ff">
          </label>
          <label class="color-field">
            <span class="color-label">Accent 2</span>
            <input class="color-swatch-input" id="colorAccent2" type="color" value="#ffd07a">
          </label>
          <label class="color-field">
            <span class="color-label">Accent 3</span>
            <input class="color-swatch-input" id="colorAccent3" type="color" value="#83f0d0">
          </label>
        </div>
        <div class="row space section-head" style="margin-top:18px;">
          <div>
            <h3 class="section-title">Interface Tuning</h3>
            <p class="brand-sub">Adjust spacing, motion, blur, rounded corners, and layout width.</p>
          </div>
          <div class="row">
            <button class="btn ghost btn-auto" type="button" id="uiLoadBtn">Load UI</button>
            <button class="btn ghost btn-auto" type="button" id="uiResetBtn">Reset UI</button>
            <button class="btn ghost btn-auto" type="button" id="uiSaveBtn">Save UI</button>
          </div>
        </div>
        <div class="ui-tuning-grid">
          <label class="ui-field">
            <span class="color-label">Density</span>
            <select id="uiDensity">
              <option value="compact">Compact</option>
              <option value="comfortable" selected>Comfortable</option>
              <option value="spacious">Spacious</option>
            </select>
          </label>
          <label class="ui-field">
            <span class="color-label">Motion</span>
            <select id="uiMotion">
              <option value="full" selected>Full</option>
              <option value="reduced">Reduced</option>
              <option value="off">Off</option>
            </select>
          </label>
          <label class="ui-field">
            <span class="color-label">Panel Radius</span>
            <input id="uiPanelRadius" type="range" min="12" max="40" value="28">
            <span class="ui-value" id="uiPanelRadiusValue">28px</span>
          </label>
          <label class="ui-field">
            <span class="color-label">Card Radius</span>
            <input id="uiCardRadius" type="range" min="10" max="34" value="24">
            <span class="ui-value" id="uiCardRadiusValue">24px</span>
          </label>
          <label class="ui-field">
            <span class="color-label">Input Radius</span>
            <input id="uiInputRadius" type="range" min="8" max="28" value="16">
            <span class="ui-value" id="uiInputRadiusValue">16px</span>
          </label>
          <label class="ui-field">
            <span class="color-label">Glass Blur</span>
            <input id="uiBlur" type="range" min="0" max="28" value="18">
            <span class="ui-value" id="uiBlurValue">18px</span>
          </label>
          <label class="ui-field ui-field-wide">
            <span class="color-label">Max Layout Width</span>
            <input id="uiShellWidth" type="range" min="1180" max="1880" step="20" value="1680">
            <span class="ui-value" id="uiShellWidthValue">1680px</span>
          </label>
        </div>
      </section>

      <section class="card control-section">
        <div class="row space section-head">
          <h3 class="section-title">Workspaces</h3>
          <button class="btn ghost btn-auto" id="workspaceRefreshBtn" type="button">Refresh</button>
        </div>
        <div class="planner-fields control-primary-grid">
          <input class="input" id="workspaceName" placeholder="Workspace name">
          <button class="btn btn-auto" id="workspaceCreateBtn" type="button">Create</button>
        </div>
        <div class="news-list control-feed" id="workspaceList"></div>
        <div class="planner-fields control-actions-grid">
          <input class="input" id="workspaceRenameInput" placeholder="Rename active workspace to...">
          <button class="btn ghost btn-auto" id="workspaceRenameBtn" type="button">Rename Active</button>
          <button class="btn ghost btn-auto" id="workspaceDuplicateBtn" type="button">Duplicate Active</button>
        </div>
        <div class="planner-fields control-actions-grid">
          <button class="btn ghost btn-auto" id="workspaceExportBtn" type="button">Export Workspaces JSON</button>
          <button class="btn ghost btn-auto" id="workspaceImportBtn" type="button">Import Workspaces JSON</button>
          <input class="input" id="workspaceImportInput" placeholder="Paste workspace JSON array/object">
        </div>
      </section>

      <section class="card control-section control-section-wide">
        <div class="row space section-head">
          <h3 class="section-title">Audit Timeline</h3>
          <div class="row">
            <button class="btn ghost btn-auto" type="button" id="auditRefreshBtn">Refresh</button>
            <button class="btn ghost btn-auto" type="button" id="auditDownloadBtn">Download CSV</button>
          </div>
        </div>
        <div class="planner-fields control-audit-grid">
          <input class="input" id="auditFilterInput" placeholder="Filter logs by type/path/status text">
          <button class="btn ghost btn-auto" type="button" id="auditFilterBtn">Apply Filter</button>
          <button class="btn ghost btn-auto" type="button" id="auditClearFilterBtn">Clear Filter</button>
        </div>
        <div class="news-list control-feed control-feed-tall" id="auditList"></div>
      </section>

    </main>
  </section>

  <script src="app-core.js"></script>
  <script src="control-center.js"></script>
</body>
</html>
